<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0b0d10">
<title>AgentAutopsy — Investigation Tour</title>
<style>
  :root{
    --bg:#0b0d10; --bg2:#0e1116; --panel:#141a20; --panel2:#1a222b; --hover:#1e2731;
    --line:#243039; --ink:#e8edf2; --dim:#8694a1; --faint:#566370;
    --ember:#f59e0b; --ember2:#fbbf24;
    --crit:#ef4444; --high:#f97316; --med:#eab308; --low:#60a5fa; --info:#3b82f6;
    --ok:#22c55e; --egress:#ff2d55; --nhi:#fca5a5; --hum:#7dd3fc;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html{background:#0b0d10;color-scheme:dark;scroll-behavior:smooth}
  html,body{margin:0;min-height:100%}
  body{background:#0b0d10 !important;color:#e8edf2;font-family:var(--mono);font-size:13px;
    line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
  a{color:var(--ember2);text-decoration:none}
  ::-webkit-scrollbar{width:9px;height:9px} ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  :focus-visible{outline:2px solid var(--ember2);outline-offset:2px;border-radius:4px}

  /* Layout: sidebar + main */
  .side{width:236px;flex:none;background:var(--bg2);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:14px 0;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:9px;padding:0 18px 12px;font-weight:700;letter-spacing:.03em}
  .brand .mark{width:24px;height:24px;border:2px solid var(--ember);border-radius:5px;color:var(--ember);
    display:grid;place-items:center;font-size:13px;box-shadow:0 0 14px rgba(245,158,11,.3)}
  .brand b{color:var(--ink)} .brand span{color:var(--ember)}
  .demoaff{margin:0 14px 8px;font-size:9.5px;color:var(--ember2);border:1px solid rgba(245,158,11,.3);
    background:rgba(245,158,11,.06);border-radius:7px;padding:6px 9px;letter-spacing:.04em;text-transform:uppercase}
  nav{display:flex;flex-direction:column;padding:4px 10px;gap:2px;flex:1;overflow:auto}
  nav button{display:flex;align-items:center;gap:10px;background:none;border:none;color:var(--dim);
    font-family:var(--mono);font-size:12.5px;text-align:left;padding:9px 12px;border-radius:8px;cursor:pointer;width:100%}
  nav button:hover{background:var(--hover);color:var(--ink)}
  nav button[aria-current="true"]{background:rgba(245,158,11,.1);color:var(--ember2);font-weight:600}
  nav button .ic{width:16px;text-align:center;flex:none}
  .integ{margin:8px 14px 0;padding:8px 10px;border-radius:8px;font-size:10px;border:1px solid var(--line)}
  .integ .l1{color:var(--ok);font-weight:600} .integ .l2{color:var(--low);margin-top:3px}

  main{flex:1;min-width:0;overflow:auto;padding:26px 32px 60px}
  .vhead{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .vhead h1{font-size:20px;margin:0;font-weight:700;letter-spacing:-.01em}
  .vhead .sub{color:var(--dim);font-size:12px}
  .view{display:none;animation:fade .25s ease} .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* Overview / verdict */
  .hero{margin:2px 0 22px}
  .hero .hl{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.18;color:var(--ink)}
  .hero .hl span{color:var(--ember);text-shadow:0 0 22px rgba(245,158,11,.35)}
  .hero .hs{color:var(--dim);font-size:12.5px;margin-top:10px;max-width:640px;line-height:1.65;
    border-left:2px solid rgba(245,158,11,.45);padding-left:12px}
  .verdict{display:flex;align-items:center;gap:18px;padding:18px 20px;border-radius:14px;margin-bottom:18px;
    border:1px solid rgba(239,68,68,.5);background:linear-gradient(90deg,rgba(239,68,68,.12),var(--panel))}
  .verdict .score{font-size:40px;font-weight:800;line-height:1;flex:none;width:100px;height:100px;border-radius:15px;
    display:grid;place-items:center;border:2px solid var(--crit);color:var(--crit);background:rgba(239,68,68,.08)}
  .verdict .vband{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--crit);font-weight:700}
  .verdict .vsum{color:var(--ink);font-size:13px;margin-top:5px;line-height:1.55;max-width:680px}
  .pillrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .pill{font-size:10.5px;padding:3px 10px;border:1px solid var(--line);border-radius:999px;color:var(--dim)}
  .pill.ok{color:var(--ok);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06)}
  .pill.sig{color:var(--ember2);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.06)}
  .pill.xs{color:var(--low);border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.06)}
  .statrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin:18px 0}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px}
  .stat .n{font-size:26px;font-weight:700} .stat .l{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
  .stat.crit .n{color:var(--crit)} .stat.exf .n{color:var(--egress)} .stat.casc .n{color:var(--ember2)}
  .xzero{background:linear-gradient(90deg,rgba(96,165,250,.08),var(--panel));border:1px solid rgba(96,165,250,.4);
    border-radius:12px;padding:16px 18px;margin-bottom:16px}
  .xzero .xt{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--low);font-weight:700}
  .xzero .xb{font-size:14px;color:var(--ink);margin-top:6px} .xzero .xb b{color:var(--low)}
  .xzero .xw{font-size:12px;color:var(--dim);margin-top:5px;line-height:1.55}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:18px;margin-bottom:14px}
  .card h3{margin:0 0 8px;font-size:14px} .card p{color:var(--dim);margin:0;font-size:12.5px;line-height:1.6}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .sources{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .src{font-size:10.5px;color:var(--dim);background:var(--panel2);border:1px solid var(--line);padding:4px 9px;border-radius:6px}
  .src b{color:var(--ink)}

  /* Generic panels */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:12px}
  .muted{color:var(--faint);font-style:italic;padding:14px}
  .sechead{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin:18px 0 10px}
  .sechead .n{color:var(--ember2);font-weight:700;margin-left:4px}
  .demo-note{font-size:11px;color:var(--faint);border:1px dashed var(--line);border-radius:9px;padding:11px 13px;margin:14px 0}

  /* Intake wizard */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;margin-bottom:14px}
  .pchk{display:flex;gap:9px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);
    border-radius:9px;padding:10px 12px;cursor:pointer}
  .pchk:hover{border-color:var(--ember)} .pchk.on{border-color:var(--ember);background:rgba(245,158,11,.06)}
  .pchk .box{width:15px;height:15px;border:1.5px solid var(--line);border-radius:4px;flex:none;margin-top:1px;display:grid;place-items:center;font-size:10px;color:#0b0d10}
  .pchk.on .box{background:var(--ember);border-color:var(--ember)}
  .pchk .pl{font-size:12px;color:var(--ink)} .pchk .ps{font-size:10px;color:var(--dim);margin-top:2px}
  .winrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:8px 0 14px}
  .winrow input{background:var(--bg);border:1px solid var(--line);border-radius:7px;color:var(--ink);
    font-family:var(--mono);font-size:12px;padding:8px 10px}
  .winrow label{font-size:11px;color:var(--dim)}
  .btn{background:var(--ember);color:#0b0d10;border:none;font-family:var(--mono);font-weight:700;font-size:12px;
    padding:9px 16px;border-radius:8px;cursor:pointer} .btn:hover{background:var(--ember2)}
  .btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  pre.plan{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:16px;overflow:auto;
    white-space:pre-wrap;font-size:11px;color:var(--ink);max-height:50vh;margin-top:6px}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--dim);background:var(--panel);margin:8px 0}
  .samplebtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px}
  .sfile{background:var(--panel2);border:1px solid var(--line);color:var(--ink);font-family:var(--mono);font-size:11px;
    padding:6px 11px;border-radius:7px;cursor:pointer} .sfile:hover{border-color:var(--ember)}
  .valcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-top:10px}
  .valcard.ambiguous{border-color:rgba(234,179,8,.5);background:linear-gradient(90deg,rgba(234,179,8,.07),var(--panel))}
  .valrow{display:flex;gap:10px;font-size:12px;padding:3px 0} .valrow .vk{width:130px;color:var(--dim);flex:none}
  .gapline{font-size:11.5px;color:var(--med);border-left:2px solid var(--med);padding-left:9px;margin-top:4px}
  .gapline.ok{color:var(--ok);border-color:var(--ok)}
  .covpill{display:inline-block;font-size:11px;padding:3px 10px;border-radius:999px;margin:3px 5px 0 0;border:1px solid var(--line)}
  .covpill.in{color:var(--ok);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06)}
  .covpill.miss{color:var(--med);border-color:rgba(234,179,8,.4);background:rgba(234,179,8,.06)}

  /* Replay console */
  .console{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:14px}
  .ctrls{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(245,158,11,.05),transparent)}
  .play{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;flex:none;background:var(--ember);color:#0b0d10;
    font-size:15px;display:grid;place-items:center;box-shadow:0 0 18px rgba(245,158,11,.4);transition:transform .1s}
  .play:hover{transform:scale(1.06)} .play.pulse{animation:pp 1.8s ease-in-out infinite}
  @keyframes pp{0%{box-shadow:0 0 0 0 rgba(245,158,11,.55),0 0 18px rgba(245,158,11,.4)}
    70%{box-shadow:0 0 0 12px rgba(245,158,11,0),0 0 18px rgba(245,158,11,.4)}
    100%{box-shadow:0 0 0 0 rgba(245,158,11,0),0 0 18px rgba(245,158,11,.4)}}
  .scrub{flex:1;display:flex;flex-direction:column;gap:6px}
  .track{position:relative;height:8px;background:var(--panel2);border-radius:6px;cursor:pointer}
  .fill{position:absolute;top:0;left:0;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--ember),var(--egress));width:0%}
  .ticks{position:absolute;top:0;left:0;right:0;height:100%;pointer-events:none}
  .tick{position:absolute;top:-3px;width:2px;height:14px;background:var(--faint);border-radius:2px}
  .tick.crit{background:var(--crit)} .tick.egress{background:var(--egress)}
  .clock{font-size:11px;color:var(--dim);display:flex;justify-content:space-between} .clock b{color:var(--ember2)}
  .speed{display:flex;gap:4px}
  .speed button{background:var(--panel2);border:1px solid var(--line);color:var(--dim);font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:5px;cursor:pointer}
  .speed button.on{color:#0b0d10;background:var(--ember);border-color:var(--ember)}
  .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:0}
  .col{padding:16px;overflow:auto;max-height:520px} .col.left{border-right:1px solid var(--line)}
  .coltitle{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;margin:0 0 12px;display:flex;justify-content:space-between}
  .ev{display:grid;grid-template-columns:60px 1fr;gap:10px;padding:7px 8px;border-radius:7px;border:1px solid transparent;opacity:.2;transition:opacity .25s,background .25s}
  .ev.shown{opacity:1} .ev.active{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.3)}
  .ev.egress.active{background:rgba(255,45,85,.09);border-color:rgba(255,45,85,.4)}
  .ev .t{color:var(--faint);font-size:10px;padding-top:1px} .ev .row1{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .who{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px}
  .who.nhi{background:rgba(239,68,68,.16);color:#fca5a5} .who.hum{background:rgba(56,189,248,.16);color:#7dd3fc} .who.unknown{background:rgba(125,138,151,.18);color:var(--dim)}
  .actname{font-weight:600} .tgt{color:var(--dim);font-size:11px}
  .egbadge{font-size:9.5px;font-weight:700;color:#0b0d10;background:var(--egress);padding:1px 6px;border-radius:4px}
  .graphwrap{position:relative;height:280px;background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden}
  svg{width:100%;height:100%}
  .node circle{fill:var(--panel2);stroke:var(--line);stroke-width:1.5;transition:all .35s}
  .node.lit circle{stroke:var(--ember);fill:#231a0d;stroke-width:2.5;filter:url(#glow)}
  .node.tainted circle{stroke:var(--egress);fill:#2a0d12;stroke-width:2.5}
  .node text{fill:var(--dim);font-size:8px;text-anchor:middle} .node.dense text{font-size:7px}
  .node.lit text,.node.tainted text{fill:var(--ink)}
  .edge{stroke:var(--line);stroke-width:1.5;fill:none;opacity:.25;transition:all .35s}
  .edge.lit{stroke:var(--ember);opacity:.85;stroke-width:2;filter:url(#glow)} .edge.tainted{stroke:var(--egress);opacity:.95;stroke-width:2.5}
  .blast{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px}
  .blast h4{margin:0 0 9px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint)}
  .braw{display:flex;gap:8px;margin-bottom:6px;font-size:11px} .braw .k{width:60px;color:var(--dim);flex:none}
  .braw.eg .v{color:var(--egress);font-weight:600} .empty{color:var(--faint);font-style:italic}
  .finding{background:var(--panel);border:1px solid var(--line);border-left-width:4px;border-radius:0 9px 9px 0;
    padding:11px 13px;margin-bottom:10px;opacity:.2;transform:translateX(6px);transition:opacity .3s,transform .3s}
  .finding.shown{opacity:1;transform:none}
  .finding.critical{border-left-color:var(--crit)} .finding.high{border-left-color:var(--high)}
  .finding.medium{border-left-color:var(--med)} .finding.low{border-left-color:var(--low)} .finding.informational{border-left-color:var(--info)}
  .fhead{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
  .sev{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase}
  .sev.critical{background:var(--crit);color:#fff} .sev.high{background:var(--high);color:#0b0d10}
  .sev.medium{background:var(--med);color:#0b0d10} .sev.low{background:var(--low);color:#0b0d10} .sev.informational{background:var(--info);color:#fff}
  .fid{color:var(--dim);font-size:11px} .ftitle{font-weight:600;font-size:12.5px} .fbasis{color:var(--dim);font-size:11.5px;line-height:1.5}
  .frefs{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap} .ref{font-size:9.5px;color:var(--faint);border:1px solid var(--line);padding:1px 6px;border-radius:4px}

  /* Chains / root cause / cross-source */
  .chains{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:12px}
  .chain{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px}
  .chain .chead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .chain .cactor{font-weight:700;font-size:12.5px;color:var(--ember2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
  .chain .cscore{font-size:11px;color:var(--dim);flex:none}
  .cxsrc{font-size:10.5px;color:var(--low);font-weight:600;margin:0 0 8px}
  .phase{display:grid;grid-template-columns:18px 1fr;gap:10px;position:relative;padding-bottom:11px}
  .phase:last-child{padding-bottom:0}
  .phase .dot{width:10px;height:10px;border-radius:50%;background:var(--ember);margin-top:3px;z-index:2}
  .phase.crit .dot{background:var(--crit)}
  .phase::before{content:"";position:absolute;left:4.5px;top:11px;bottom:-2px;width:1.5px;background:var(--line)}
  .phase:last-child::before{display:none}
  .phase .pn{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint)}
  .phase .pt{font-size:12px}
  .rccase{border-radius:12px;padding:16px 18px;margin-bottom:16px;border:1px solid rgba(245,158,11,.4);
    background:linear-gradient(90deg,rgba(245,158,11,.08),var(--panel))}
  .rccase.ambiguous{border-color:rgba(234,179,8,.4)} .rccase.undetermined{background:var(--panel);border-color:var(--line)}
  .rcband{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--ember2)}
  .rcroot{font-size:14px;margin-top:6px} .rcroot b{color:var(--ember2)}
  .rcwhy{color:var(--dim);font-size:12px;margin-top:5px;line-height:1.55}
  .rcxsrc{margin:8px 0 4px;font-size:11.5px;color:var(--low);font-weight:600;border:1px solid rgba(96,165,250,.4);
    background:rgba(96,165,250,.06);border-radius:7px;padding:7px 10px}
  .rcpath{margin:10px 0 2px;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .rcstep{display:grid;grid-template-columns:96px 1fr;gap:10px;padding:8px 11px;border-top:1px solid var(--line);align-items:baseline}
  .rcstep:first-child{border-top:none} .rcstep.root{background:rgba(245,158,11,.07)} .rcstep.impact{background:rgba(239,68,68,.06)}
  .rcstep .lk{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  .rcsrc{display:inline-block;font-size:8.5px;font-weight:700;text-transform:uppercase;background:rgba(245,158,11,.16);
    color:var(--ember2);padding:1px 5px;border-radius:4px;margin-right:3px}
  .rcstep .sv{font-size:12px} .rcstep .sw{font-size:10px;color:var(--dim);margin-top:2px}

  /* Memory poisoning */
  .mp{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:15px;margin-bottom:12px}
  .mp.executed{border-color:rgba(239,68,68,.4);background:linear-gradient(90deg,rgba(239,68,68,.06),var(--panel))}
  .mph{display:flex;gap:9px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .mtag{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:4px}
  .mtag.executed{background:var(--crit);color:#fff} .mtag.dormant{background:var(--med);color:#0b0d10} .mtag.propagation{background:var(--egress);color:#fff}
  .track2{display:flex;align-items:stretch;margin:4px 0 10px;flex-wrap:wrap;gap:4px}
  .mstep{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 11px;min-width:110px}
  .mstep.write{border-color:rgba(245,158,11,.4)} .mstep.act{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.08)}
  .mstep .sk{font-size:9px;text-transform:uppercase;color:var(--faint)} .mstep .sv{font-size:11px;margin-top:2px} .mstep .ss{font-size:9.5px;color:var(--dim);margin-top:2px}
  .mgap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 6px;min-width:80px}
  .mgap .gl{width:100%;height:2px;background:repeating-linear-gradient(90deg,var(--egress) 0,var(--egress) 5px,transparent 5px,transparent 10px)}
  .mgap .gt{font-size:10px;color:var(--egress);font-weight:700;margin-top:4px;white-space:nowrap}
  .mprop{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:4px 0 8px}
  .pnode{background:var(--panel2);border:1px solid var(--egress);border-radius:6px;padding:3px 9px;font-size:11px} .parrow{color:var(--egress)}

  /* Ask */
  .askbar{display:flex;gap:9px;margin-bottom:10px}
  .askbar input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:var(--mono);font-size:13px;padding:10px 13px}

// ---------- Attack chains ----------
const PHL={initial_access:'initial access',persistence:'persistence',privilege_escalation:'privilege escalation',
  discovery:'discovery',collection:'collection',lateral_movement:'lateral movement',exfiltration:'exfiltration',impact:'impact'};
function chainCard(c){
  let actor=c.actor; if(actor&&actor.startsWith('arn:')){const p=actor.split('/');actor=p[1]||actor;}
  const xs=(c.cross_source&&(c.spans_sources||[]).length>1)?`<div class="cxsrc">⇄ ${c.spans_sources.length} sources: ${srcList(c.spans_sources)}</div>`:'';
  const phases=(c.findings||[]).map(f=>`<div class="phase ${f.severity==='critical'?'crit':''}"><div class="dot"></div>
    <div><div class="pn">${esc(PHL[f.phase]||f.phase)}</div><div class="pt">${esc(f.title)} <span style="color:var(--faint)">(${esc(f.id)} · ${esc(f.severity)})</span></div></div></div>`).join('');
  return `<div class="chain"><div class="chead"><span class="cactor" title="${esc(c.actor)}">${esc(actor)}</span>
    <span class="cscore">${c.distinct_phases} phases · score ${c.score}</span></div>${xs}<div>${phases}</div></div>`;
}

RENDER.rootcause = function(){

  let html=`<div class="rccase ${out}"><div class="rcband">Case-level root cause · ${esc(out)} · confidence ${esc(c.confidence||'low')}</div>`;
  if(c.root_cause){const rt=c.root_cause;
    html+=`<div class="rcroot">Patient zero: <b>${esc(rt.action)}</b> by ${esc(rt.actor)} at ${esc((rt.timestamp||'').slice(0,19))}${rt.external_source?(' · source '+esc(rt.external_source)):''}</div>

// ---------- Memory poisoning ----------
RENDER.memory = function(){
  const mp=D.memory_poisoning||{chains:[],propagation:[]};
  const ev=id=>D.timeline.find(e=>e.event_id===id);
  const eShort=e=>{if(!e)return'—';let d=e.identity.display||e.identity.id;return d.length>18?d.slice(0,17)+'…':d;};
  const human=s=>{if(s<90)return s+'s';if(s<5400)return Math.round(s/60)+' min';if(s<172800)return (s/3600).toFixed(1)+' hours';return (s/86400).toFixed(1)+' days';};
  let html='';
  (mp.chains||[]).forEach(c=>{const exe=c.kind==='poisoning_executed';const w=ev(c.write_event),rd=ev(c.read_event),a=exe?ev(c.act_event):null;
    html+=`<div class="mp ${exe?'executed':''}"><div class="mph"><span class="mtag ${exe?'executed':'dormant'}">${exe?'EXECUTED CHAIN':'DORMANT'}</span>
      <span style="font-weight:600">${exe?'Write → dwell → retrieve → act':'Poisoned memory retrieved (no act yet)'}</span>
      <span style="margin-left:auto;color:var(--dim);font-size:10.5px">${esc(c.match_basis)} · ${esc(c.confidence)}</span></div>
      <div class="track2"><div class="mstep write"><div class="sk">① write (poisoned)</div><div class="sv">${esc(eShort(w))}</div><div class="ss">${esc((w&&w.timestamp||'').slice(0,10))}</div></div>
        <div class="mgap"><div class="gl"></div><div class="gt">⏱ ${human(c.dwell_seconds)} dwell</div></div>
        <div class="mstep"><div class="sk">② retrieve</div><div class="sv">${esc(eShort(rd))}</div><div class="ss">${esc((rd&&rd.timestamp||'').slice(0,10))}</div></div>
        ${exe?`<div class="mgap"><div class="gl"></div><div class="gt">then</div></div><div class="mstep act"><div class="sk">③ harmful act</div><div class="sv">${esc(a?a.action.name:'')}</div><div class="ss">${esc((a&&a.timestamp||'').slice(0,10))}</div></div>`:''}
      </div><div class="fbasis">${esc(c.reason)}</div></div>`;});
  (mp.propagation||[]).forEach(c=>{const path=(c.propagation_path||[]).map(n=>`<span class="pnode">${esc(n)}</span>`).join('<span class="parrow">→</span>');
    html+=`<div class="mp"><div class="mph"><span class="mtag propagation">CROSS-AGENT SPREAD</span><span style="font-weight:600">Poisoned memory propagating via shared store</span>
      <span style="margin-left:auto;color:var(--dim);font-size:10.5px">${esc(c.confidence)}</span></div><div class="mprop">${path}</div><div class="fbasis">${esc(c.reason)}</div></div>`;});
  $('#view-memory').innerHTML=`<div class="vhead"><h1>Memory poisoning · OWASP ASI06</h1><span class="sub">the time gap runtime guardrails miss — write → dwell → retrieve → act</span></div>
    <div class="panel">Memory poisoning plants an instruction that sits dormant for days, then executes when retrieved as
      trusted context. The write and the act are separated in time, so runtime guardrails never connect them — only a
      retrospective reconstruction can.</div>${html||'<div class="muted">none</div>'}`;
};

  $('#view-reports').innerHTML=`<div class="vhead"><h1>Reports &amp; export</h1><span class="sub">the documents an incident actually requires — generated by the real engine</span></div>
    <div class="ottabs"><button class="ot on" data-o="examiner">Examiner report</button>
      <button class="ot" data-o="art73">EU AI Act Art. 73</button>
      <button class="ot" data-o="art12">Art. 12 attestation</button>
      <button class="ot" data-o="stix">STIX 2.1 export</button></div>
    <pre class="outprev" id="outPrev"></pre><div class="stixrow" id="stixRow" style="display:none"></div>`;
  const prev=$('#outPrev'), row=$('#stixRow');
  function show(w){document.querySelectorAll('#view-reports .ot').forEach(x=>x.classList.toggle('on',x.dataset.o===w));
    if(w==='stix'){prev.style.display='none';row.style.display='flex';const cc=(OUT.stix&&OUT.stix.object_counts)||{};
      row.innerHTML=`<div class="stixchip"><b>${OUT.stix?OUT.stix.total:0}</b> STIX 2.1 objects</div>`+
        Object.entries(cc).map(([k,v])=>`<div class="stixchip"><b>${v}</b> ${esc(k)}</div>`).join('')+
        `<div class="stixchip">deterministic IDs · severity + confidence preserved · SIEM/TIP-ready</div>`;}
    else{row.style.display='none';prev.style.display='block';prev.textContent=OUT[w+'_excerpt']||'preview unavailable';}}
  document.querySelectorAll('#view-reports .ot').forEach(b=>b.addEventListener('click',()=>show(b.dataset.o)));
  show('examiner');
};

// ---------- Timeline replay ----------
let stopReplay=()=>{};
RENDER.replay = function(){
  $('#view-replay').innerHTML=`<div class="vhead"><h1>Timeline replay</h1><span class="sub">press play — the incident streams, the agent graph lights up, findings surface as their evidence appears</span></div>
    <div class="console"><div class="ctrls">
      <button class="play" id="play" aria-label="Play replay">▶</button>
      <div class="scrub"><div class="track" id="track" role="slider" aria-label="replay position" tabindex="0"><div class="fill" id="fill"></div><div class="ticks" id="ticks"></div></div>
        <div class="clock"><span id="clkNow">—</span><span>step <b id="clkStep">0</b> / <span id="clkTot">0</span></span></div></div>
      <div class="speed"><button data-sp="1">1×</button><button data-sp="2" class="on">2×</button><button data-sp="4">4×</button></div>
    </div>
    <div class="grid"><div class="col left"><div class="coltitle">Reconstructed event stream <span id="evShown">0</span></div><div id="stream"></div></div>
      <div class="col"><div class="coltitle">Agent delegation graph</div>
        <div class="graphwrap"><svg viewBox="0 0 480 280" preserveAspectRatio="xMidYMid meet" aria-label="agent delegation graph">
          <defs><filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <g id="edges"></g><g id="nodes"></g></svg></div>
        <div class="blast"><h4>Blast radius · focal identities</h4><div id="blast"></div></div>
        <div class="coltitle" style="margin-top:14px">Findings <span id="fShown">0</span> surfaced</div><div id="findings"></div></div></div></div>`;
  initReplay();
};
function initReplay(){
  const TL=D.timeline, stream=$('#stream');
  TL.forEach((e,i)=>{const eg=e.data.direction==='egress';const div=document.createElement('div');
    div.className='ev'+(eg?' egress':'');div.id='ev'+i;
    div.innerHTML=`<div class="t">${esc((e.timestamp||'').slice(11,19))}</div><div><div class="row1">
      <span class="who ${whoCls(e.identity.type)}">${whoLbl(e.identity.type)}</span><span class="actname">${esc(e.action.name)}</span>
      ${eg?'<span class="egbadge">EGRESS ⮕</span>':''}</div>
      <div class="tgt">${esc(short(e.identity.display||e.identity.id))} · ${esc(e.target.system)}${e.target.resource?(' / '+esc(e.target.resource)):''}</div></div>`;
    stream.appendChild(div);});
  $('#clkTot').textContent=TL.length;
  const evIdx={}; TL.forEach((e,i)=>evIdx[e.event_id]=i);
  const FIND=D.findings.map(f=>{let m=0;(f.events||[]).forEach(id=>{if(evIdx[id]!=null)m=Math.max(m,evIdx[id]);});return {...f,revealAt:m};});
  const fel=$('#findings');
  FIND.forEach((f,i)=>{const d=document.createElement('div');d.className='finding '+f.severity;d.id='find'+i;
    d.innerHTML=`<div class="fhead"><span class="sev ${f.severity}">${f.severity}/${f.confidence}</span><span class="fid">${esc(f.id)}</span><span class="ftitle">${esc(f.title)}</span></div>
      <div class="fbasis">${esc(f.reason)}</div><div class="frefs">${(f.technique_refs||[]).map(r=>`<span class="ref">${esc(r)}</span>`).join('')}</div>`;
    fel.appendChild(d);});
  // graph
  const G=D.delegation_graph;
  const agentNodes=G.nodes.filter(n=>!n.startsWith('arn:')&&!n.startsWith('key_')&&!n.startsWith('user-'));
  const useNodes=agentNodes.length?agentNodes:G.nodes.slice(0,8);
  const layer={}; useNodes.forEach(n=>layer[n]=0);
  G.edges.forEach(ed=>{if(layer[ed.to]!=null&&layer[ed.from]!=null)layer[ed.to]=Math.max(layer[ed.to],layer[ed.from]+1);});
  const byLayer={}; useNodes.forEach(n=>{(byLayer[layer[n]||0]=byLayer[layer[n]||0]||[]).push(n);});
  const pos={},W=480,H=280; Object.keys(byLayer).forEach(L=>{const arr=byLayer[L];const y=55+(+L)*85;arr.forEach((n,k)=>pos[n]={x:(W/(arr.length+1))*(k+1),y});});
  const SVGNS='http://www.w3.org/2000/svg';
  const idxInLayer={}; Object.keys(byLayer).forEach(L=>byLayer[L].forEach((n,k)=>idxInLayer[n]=k));
  const edgesG=$('#edges'),nodesG=$('#nodes'),drawn=[];
  G.edges.forEach((ed,i)=>{if(!pos[ed.from]||!pos[ed.to])return;const a=pos[ed.from],b=pos[ed.to];
    const p=document.createElementNS(SVGNS,'path');const mx=(a.x+b.x)/2;
    p.setAttribute('d',`M${a.x},${a.y} C${mx},${a.y} ${mx},${b.y} ${b.x},${b.y}`);p.setAttribute('class','edge');edgesG.appendChild(p);drawn.push({...ed,el:p});});
  function fit(n,room){const max=Math.max(4,Math.min(13,Math.floor(room/5.8)));return n.length>max?n.slice(0,max-1)+'…':n;}
  Object.keys(pos).forEach(n=>{const p=pos[n];const L=layer[n]||0,cnt=byLayer[L].length,sp=W/(cnt+1);
    const stag=cnt>4||sp<70,dense=cnt>6||sp<48;
    const g=document.createElementNS(SVGNS,'g');g.setAttribute('class','node'+(dense?' dense':''));g.id='nd-'+btoa(n).replace(/=/g,'');g.dataset.name=n;
    const t=document.createElementNS(SVGNS,'title');t.textContent=n;
    const c=document.createElementNS(SVGNS,'circle');c.setAttribute('cx',p.x);c.setAttribute('cy',p.y);c.setAttribute('r',20);
    g.appendChild(t);g.appendChild(c);
    if(cnt<=18){const row=stag?(idxInLayer[n]%2):0;const tx=document.createElementNS(SVGNS,'text');
      tx.setAttribute('x',p.x);tx.setAttribute('y',p.y+31+row*12);tx.textContent=fit(n,stag?sp*2:sp);g.appendChild(tx);}
    nodesG.appendChild(g);});
  const nodeEl=n=>document.getElementById('nd-'+btoa(n).replace(/=/g,''));
  const tainted=new Set(); D.cascades.forEach(c=>(c.propagation_path||[]).forEach(n=>tainted.add(n)));
  // ticks
  const ticks=$('#ticks');
  TL.forEach((e,i)=>{if(e.data.direction==='egress'){const t=document.createElement('div');t.className='tick egress';t.style.left=(i/TL.length*100)+'%';ticks.appendChild(t);}});
  FIND.forEach(f=>{if(f.severity==='critical'){const t=document.createElement('div');t.className='tick crit';t.style.left=(f.revealAt/TL.length*100)+'%';ticks.appendChild(t);}});

  let step=0,playing=false,speed=2,timer=null;const base=900;
  function render(){
    $('#clkStep').textContent=step;
    $('#clkNow').textContent=step>0?TL[step-1].timestamp.slice(0,19).replace('T',' ')+' UTC':'—';
    $('#fill').style.width=(TL.length?(step/TL.length*100):0)+'%';
    let shown=0;
    TL.forEach((e,i)=>{const el=$('#ev'+i);el.classList.toggle('shown',i<step);el.classList.toggle('active',i===step-1);if(i<step)shown++;});
    $('#evShown').textContent=shown;
    if(step>0&&!reduceMotion){const a=$('#ev'+(step-1));if(a)a.scrollIntoView({block:'nearest',behavior:'smooth'});}
    const seen=new Set();for(let i=0;i<step;i++){seen.add(TL[i].identity.id);seen.add(TL[i].identity.display);}
    Object.keys(pos).forEach(n=>{const el=nodeEl(n);if(!el)return;const lit=seen.has(n);const tt=tainted.has(n)&&lit;
      el.classList.toggle('lit',lit&&!tt);el.classList.toggle('tainted',tt);});
    drawn.forEach(ed=>{const ei=evIdx[ed.evidence_event];const lit=ei!=null?ei<step:(pos[ed.from]&&tainted.has(ed.from));
      const tt=tainted.has(ed.from)&&tainted.has(ed.to)&&lit;ed.el.classList.toggle('lit',lit&&!tt);ed.el.classList.toggle('tainted',tt);});
    let fs=0;FIND.forEach((f,i)=>{const on=step>f.revealAt;$('#find'+i).classList.toggle('shown',on);if(on)fs++;});
    $('#fShown').textContent=fs;
  }
  // Blast radius is shown as the PRE-COMPUTED engine result (D.blast_radius). The demo never
  // recomputes focal-identity selection or read/write/egress categorisation client-side.
  (function showBlast(){
    const b=D.blast_radius||{};
    const row=(k,v,e)=>`<div class="braw${e?' eg':''}"><span class="k">${k}</span><span class="v">${v||'<span class=empty>none</span>'}</span></div>`;
    $('#blast').innerHTML=row('read',(b.reads||[]).slice(0,5).map(esc).join(', '))
      +row('wrote',(b.writes||[]).slice(0,5).map(esc).join(', '))
      +row('egress',(b.egress||[]).map(g=>esc((g&&g.target)||g)).slice(0,5).join(', '),true);
  })();
  function tick(){if(step<TL.length){step++;render();}else stop();}
  function start(){playing=true;$('#play').textContent='❚❚';$('#play').classList.remove('pulse');clearInterval(timer);if(step>=TL.length)step=0;timer=setInterval(tick,base/speed);}
  function stop(){playing=false;$('#play').textContent='▶';clearInterval(timer);}
  stopReplay=stop;
  $('#play').onclick=()=>playing?stop():start();
  $('#play').classList.add('pulse');
  $('#track').onclick=e=>{const r=$('#track').getBoundingClientRect();step=Math.round((e.clientX-r.left)/r.width*TL.length);step=Math.max(0,Math.min(TL.length,step));render();};
  $('#track').addEventListener('keydown',e=>{if(e.key==='ArrowRight'){step=Math.min(TL.length,step+1);render();}else if(e.key==='ArrowLeft'){step=Math.max(0,step-1);render();}});
  document.querySelectorAll('.speed button').forEach(b=>b.onclick=()=>{speed=+b.dataset.sp;document.querySelectorAll('.speed button').forEach(x=>x.classList.remove('on'));b.classList.add('on');if(playing)start();});
  render();
}

// ---- boot ----
buildNav();
RENDER.overview();
</script>
